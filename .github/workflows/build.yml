name: Build OriginalPosterPatch

on:
  push:
    branches:
      - OriginalPosterPatch
    paths:
      - 'OriginalPosterPatch/**'
      - '.github/workflows/**'
      - 'NuGet.config'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装 .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: 还原依赖
        run: dotnet restore OriginalPosterPatch/OriginalPosterPatch.csproj

      - name: 构建
        run: dotnet build OriginalPosterPatch/OriginalPosterPatch.csproj -c Release --no-restore

      - name: 上传 DLL
        uses: actions/upload-artifact@v4
        with:
          name: OriginalPosterPatch
          path: OriginalPosterPatch/bin/Release/net8.0/OriginalPosterPatch.dll