name: Build OriginalPosterPatch

on:
  push:
    branches:
      - OriginalPosterPatch
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 8.0.x }

      - name: 构建
        run: dotnet build OriginalPosterPatch/OriginalPosterPatch.csproj -c Release 2>&1

      - uses: actions/upload-artifact@v4
        with:
          name: OriginalPosterPatch
          path: OriginalPosterPatch/bin/Release/net8.0/Merged-OriginalPosterPatch.dll
          if-no-files-found: error
