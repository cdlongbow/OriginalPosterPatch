name: Build OriginalPosterPatch

on:
  push:
    branches:
      - OriginalPosterPatch
    paths:
      - 'OriginalPosterPatch/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装 .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: 还原新插件
        run: dotnet restore OriginalPosterPatch/OriginalPosterPatch.csproj

      - name: 列出已还原的包
        run: |
          echo "=== MediaBrowser.Server.Core ===" && ls ~/.nuget/packages/mediabrowser.server.core/ 2>/dev/null || echo "not found"
          echo "=== MediaBrowser.Common ===" && ls ~/.nuget/packages/mediabrowser.common/ 2>/dev/null || echo "not found"
          echo "=== Emby.Web.GenericEdit ===" && ls ~/.nuget/packages/emby.web.genericedit/ 2>/dev/null || echo "not found"
          echo "=== Lib.Harmony ===" && ls ~/.nuget/packages/lib.harmony/ 2>/dev/null || echo "not found"

      - name: 构建新插件
        run: dotnet build OriginalPosterPatch/OriginalPosterPatch.csproj -c Release --no-restore 2>&1